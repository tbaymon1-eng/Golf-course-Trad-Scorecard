<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Create account — Tournament platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Barlow:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#d9d1c2; --ink:#2f2a26; --line:#9a6217; --green:#2f7a31; --blue:#12356f; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: Barlow, system-ui, sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { width: min(440px, 100%); background: rgba(255,255,255,.2); border: 4px solid rgba(154,98,23,.45); border-radius: 24px; padding: 28px; }
    h1 { font-family: Cinzel, serif; font-size: 1.5rem; margin: 0 0 8px; }
    p { margin: 0 0 18px; color: #4b4641; font-size: 1rem; }
    label { display: block; font-weight: 800; margin-bottom: 6px; font-size: 0.95rem; }
    input { width: 100%; padding: 14px 16px; border-radius: 16px; border: 3px solid var(--line); font-size: 1.1rem; margin-bottom: 14px; font-family: inherit; }
    .btn { width: 100%; padding: 16px; border: none; border-radius: 16px; font-size: 1.15rem; font-weight: 900; cursor: pointer; font-family: inherit; background: var(--green); color: #fff; margin-top: 8px; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-secondary { background: var(--blue); margin-top: 12px; text-decoration: none; display: block; text-align: center; line-height: 1.3; }
    .err { color: #a32; font-weight: 700; font-size: 0.95rem; margin-top: 8px; min-height: 1.4em; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Create your course account</h1>
    <p>One account per golf course or club. You’ll get an organization ID used in all tournament links.</p>
    <form id="form">
      <label for="courseName">Course or club name</label>
      <input id="courseName" type="text" required autocomplete="organization" placeholder="e.g. Oak Valley Golf Club" />

      <label for="email">Email</label>
      <input id="email" type="email" required autocomplete="email" />

      <label for="password">Password (6+ characters)</label>
      <input id="password" type="password" required minlength="6" autocomplete="new-password" />

      <button type="submit" class="btn" id="submitBtn">Create account</button>
      <div class="err" id="err"></div>
    </form>
    <a class="btn btn-secondary" href="./login.html">Already have an account? Sign in</a>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-functions.js";
    import { firebaseConfig } from "./js/firebase-config.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const functions = getFunctions(app, "us-central1");
    const setupOrganization = httpsCallable(functions, "setupOrganization");

    const $ = (id) => document.getElementById(id);

    $("form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const courseName = $("courseName").value.trim();
      const email = $("email").value.trim();
      const password = $("password").value;
      const err = $("err");
      const btn = $("submitBtn");
      err.textContent = "";
      btn.disabled = true;

      try {
        await createUserWithEmailAndPassword(auth, email, password);
        const res = await setupOrganization({ courseName });
        const orgId = res.data?.orgId;
        if (!orgId) throw new Error("Organization was not created.");
        sessionStorage.setItem("orgId", orgId);
        window.location.href = "./dashboard.html";
      } catch (e2) {
        console.error(e2);
        const code = e2?.code || "";
        let msg = e2?.message || String(e2);
        if (code === "auth/email-already-in-use") {
          msg = "That email is already registered. Sign in instead.";
        }
        err.textContent = msg;
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
