<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tournament dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Barlow:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#d9d1c2; --ink:#2f2a26; --line:#9a6217; --green:#2f7a31; --blue:#12356f; --red:#c4462f; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: Barlow, system-ui, sans-serif; background: var(--bg); color: var(--ink); padding: 20px; }
    .wrap { max-width: 720px; margin: 0 auto; }
    h1 { font-family: Cinzel, serif; font-size: clamp(1.4rem, 4vw, 2rem); }
    .toolbar { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin: 16px 0 24px; }
    .btn { padding: 12px 20px; border: none; border-radius: 14px; font-weight: 900; cursor: pointer; font-family: inherit; font-size: 1rem; text-decoration: none; display: inline-block; color: #fff; background: var(--green); }
    .btn-blue { background: var(--blue); }
    .btn-ghost { background: transparent; color: var(--ink); border: 3px solid var(--line); }
    .btn-sm { padding: 8px 14px; font-size: 0.88rem; border-radius: 12px; }
    .btn-archive { background: #6c645c; color: #fff; }
    .btn-danger { background: var(--red); color: #fff; border: none; }
    .btn-danger:hover { filter: brightness(0.95); }
    .show-archived { display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 0.95rem; cursor: pointer; user-select: none; }
    .show-archived input { width: 18px; height: 18px; cursor: pointer; }
    .meta { color: #5f5851; font-size: 0.95rem; margin-bottom: 8px; word-break: break-all; }
    .list { display: flex; flex-direction: column; gap: 12px; }
    .item { background: rgba(255,255,255,.22); border: 3px solid rgba(154,98,23,.35); border-radius: 18px; padding: 16px 18px; }
    .item--archived { border-color: rgba(108,100,92,.55); background: rgba(255,255,255,.12); }
    .item-title-row { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; margin-bottom: 6px; }
    .item h2 { margin: 0; font-size: 1.15rem; }
    .archived-badge { font-size: 0.72rem; font-weight: 900; letter-spacing: 0.06em; text-transform: uppercase; background: rgba(108,100,92,.25); color: #4a433c; padding: 4px 10px; border-radius: 999px; border: 2px solid rgba(108,100,92,.4); }
    .item .sub { color: #5f5851; font-size: 0.9rem; margin-bottom: 10px; }
    .links { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .links a { font-size: 0.88rem; font-weight: 800; color: var(--blue); }
    .card-actions { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .empty { padding: 24px; text-align: center; color: #6c645c; border: 2px dashed var(--line); border-radius: 16px; }
    .empty .btn { margin-top: 12px; }
    .section-heading { font-family: Cinzel, serif; font-size: 1.12rem; margin: 0 0 12px; color: var(--blue); }
    .section-heading--spaced { margin-top: 28px; }
    .err { color: var(--red); font-weight: 700; min-height: 0; }
    .err:empty { display: none; }
    .platform-admin-bar {
      display: none;
      margin-bottom: 20px;
      padding: 14px 16px;
      border-radius: 16px;
      border: 3px solid var(--blue);
      background: rgba(18, 53, 111, 0.08);
    }
    .platform-admin-bar.is-visible { display: block; }
    .platform-admin-bar .platform-kicker {
      font-size: 0.72rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 8px;
    }
    .platform-admin-bar label { display: block; font-weight: 800; font-size: 0.9rem; margin-bottom: 6px; }
    .platform-admin-bar select {
      width: 100%;
      max-width: 100%;
      padding: 10px 12px;
      border-radius: 12px;
      border: 2px solid var(--line);
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      background: rgba(255,255,255,.85);
    }
    .btn-course-delete { background: #8e2c1d; color: #fff; border: none; }
    .btn-course-delete:hover { filter: brightness(0.95); }
    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(0, 0, 0, 0.42);
    }
    .modal-backdrop.is-open { display: flex; }
    .modal {
      width: min(520px, 100%);
      background: #efe8da;
      border: 3px solid rgba(154,98,23,.55);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 14px 34px rgba(0,0,0,.25);
    }
    .modal h3 { margin: 0 0 10px; font-family: Cinzel, serif; color: var(--ink); }
    .modal p { margin: 0 0 12px; color: #4b4641; line-height: 1.42; }
    .modal .err { margin: 8px 0 10px; min-height: 1.25em; }
    .modal-actions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-end; }
    .platform-admin-actions { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-org-delete { background: #7e2317; color: #fff; border: none; }
    .btn-org-delete:hover { filter: brightness(0.95); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 id="titleHeading">Tournament dashboard</h1>
    <div id="platformAdminBar" class="platform-admin-bar" aria-live="polite">
      <div class="platform-kicker">Platform admin</div>
      <label for="orgSwitcher">View organization</label>
      <select id="orgSwitcher"></select>
      <div class="platform-admin-actions">
        <button type="button" class="btn btn-sm btn-org-delete" id="deleteOrgBtn">Delete Organization</button>
      </div>
    </div>
    <p class="meta" id="orgLine"></p>
    <div class="toolbar">
      <a class="btn" href="./admin.html" id="adminBtn">Tournament admin</a>
      <button type="button" class="btn btn-ghost" id="logoutBtn">Sign out</button>
      <label class="show-archived">
        <input type="checkbox" id="showArchivedToggle" />
        Show archived
      </label>
    </div>
    <div id="err" class="err"></div>

    <h2 class="section-heading" id="coursesSectionTitle">Your courses</h2>
    <div id="coursesHost" class="list"></div>

    <h2 class="section-heading section-heading--spaced" id="tournamentsSectionTitle">Your tournaments</h2>
    <div id="listHost" class="list"></div>
  </div>

  <div id="courseDeleteModalBackdrop" class="modal-backdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="courseDeleteTitle">
      <h3 id="courseDeleteTitle">Delete course</h3>
      <p id="courseDeleteBody">This course will be hidden from active lists.</p>
      <div id="courseDeleteErr" class="err"></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-sm btn-ghost" id="courseDeleteCancelBtn">Cancel</button>
        <button type="button" class="btn btn-sm btn-course-delete" id="courseDeleteConfirmBtn">Delete Course</button>
      </div>
    </div>
  </div>

  <div id="orgDeleteModalBackdrop" class="modal-backdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="orgDeleteTitle">
      <h3 id="orgDeleteTitle">Delete organization</h3>
      <p id="orgDeleteBody">This organization will be soft-deleted and hidden from active dashboards.</p>
      <div id="orgDeleteErr" class="err"></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-sm btn-ghost" id="orgDeleteCancelBtn">Cancel</button>
        <button type="button" class="btn btn-sm btn-org-delete" id="orgDeleteConfirmBtn">Delete Organization</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore,
      collection,
      doc,
      getDoc,
      getDocs,
      query,
      where,
      updateDoc,
      serverTimestamp,
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-functions.js";
    import { firebaseConfig } from "./js/firebase-config.js";
    import {
      applyOrgTournamentParams,
      orgCoursesCollection,
      organizationsCollection,
      orgTournamentsCollection,
      tournamentDocRef,
      courseDocRef,
    } from "./js/org-paths.js";
    import {
      resolveOrganizerOrgId,
      readDashboardAuthContext,
      isPlatformAdminRole,
      withFirestoreRetry,
      isOfflineLikeFirestoreError,
    } from "./js/resolve-organizer-org.js";

    const DASHBOARD_ADMIN_ORG_KEY = "dashboardAdminOrgId";
    const ADMIN_LAST_TOURNAMENT_KEY = "tournament_admin_last_id_v1";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const deleteTournamentCallable = httpsCallable(getFunctions(app, "us-central1"), "deleteTournament");

    const $ = (id) => document.getElementById(id);

    let cachedOrgId = "";
    let showArchived = false;
    let canDeleteCourses = false;
    let pendingCourseDelete = null;
    let canDeleteOrganizations = false;
    let pendingOrgDelete = null;

    function baseDir() {
      const path = window.location.pathname;
      const dir = path.endsWith("/") ? path : path.slice(0, path.lastIndexOf("/") + 1);
      return `${window.location.origin}${dir}`;
    }

    function tournamentLinks(orgId, tId) {
      const root = baseDir();
      const u = (page) => {
        const url = new URL(page, root);
        applyOrgTournamentParams(url, orgId, tId);
        return url.toString();
      };
      return {
        scorecard: u("index.html"),
        leaderboard: u("leaderboard.html"),
        roster: u("roster.html"),
        register: u("register-complete.html"),
      };
    }

    function escapeHtml(s) {
      return String(s || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function isCourseLinkedToTournament(t, courseId) {
      const cid = String(courseId || "").trim().toLowerCase();
      if (!cid) return false;
      const explicit = String(t?.courseId || "").trim().toLowerCase();
      const legacy = String(t?.defaultCourse || t?.courseDefault || "").trim().toLowerCase();
      return explicit === cid || legacy === cid;
    }

    function openCourseDeleteModal(orgId, row) {
      pendingCourseDelete = { orgId, row };
      $("courseDeleteErr").textContent = "";
      $("courseDeleteBody").textContent = `Delete "${row.name || "Course"}"? This is a soft delete and hides it from active lists.`;
      $("courseDeleteConfirmBtn").disabled = false;
      $("courseDeleteConfirmBtn").textContent = "Delete Course";
      $("courseDeleteModalBackdrop").classList.add("is-open");
      $("courseDeleteModalBackdrop").setAttribute("aria-hidden", "false");
    }

    function closeCourseDeleteModal() {
      pendingCourseDelete = null;
      $("courseDeleteModalBackdrop").classList.remove("is-open");
      $("courseDeleteModalBackdrop").setAttribute("aria-hidden", "true");
    }

    async function listActiveOrganizations() {
      const snap = await withFirestoreRetry(() => getDocs(organizationsCollection(db)));
      const rows = [];
      snap.forEach((d) => {
        const o = d.data() || {};
        if (o.active === false) return;
        const label = String(o.name || "").trim() || "Organization";
        rows.push({ id: d.id, label });
      });
      rows.sort((a, b) => a.label.localeCompare(b.label));
      return rows;
    }

    async function getLinkedCountsForOrg(orgId) {
      const [coursesSnap, tournamentsSnap, usersA, usersB] = await Promise.all([
        withFirestoreRetry(() => getDocs(orgCoursesCollection(db, orgId))),
        withFirestoreRetry(() => getDocs(orgTournamentsCollection(db, orgId))),
        withFirestoreRetry(() => getDocs(query(collection(db, "users"), where("orgId", "==", orgId)))),
        withFirestoreRetry(() => getDocs(query(collection(db, "users"), where("organizationId", "==", orgId)))),
      ]);
      const userIds = new Set();
      usersA.forEach((d) => userIds.add(d.id));
      usersB.forEach((d) => userIds.add(d.id));
      return {
        courses: coursesSnap.size,
        tournaments: tournamentsSnap.size,
        staffUsers: userIds.size,
      };
    }

    async function openOrgDeleteModal(orgId) {
      const oid = String(orgId || "").trim();
      if (!oid) return;
      pendingOrgDelete = { orgId: oid };
      $("orgDeleteErr").textContent = "";
      $("orgDeleteBody").textContent = "Checking linked data…";
      $("orgDeleteConfirmBtn").disabled = true;
      $("orgDeleteConfirmBtn").textContent = "Checking…";
      $("orgDeleteModalBackdrop").classList.add("is-open");
      $("orgDeleteModalBackdrop").setAttribute("aria-hidden", "false");
      try {
        const counts = await getLinkedCountsForOrg(oid);
        pendingOrgDelete.counts = counts;
        console.info("[dashboard] org delete linked counts", {
          selectedOrgId: oid,
          linkedCounts: counts,
        });
        $("orgDeleteBody").textContent =
          `Delete organization "${oid}"?\n` +
          `Linked data: courses ${counts.courses}, tournaments ${counts.tournaments}, staff/users ${counts.staffUsers}. ` +
          "This is a soft delete; data remains recoverable.";
      } catch (e) {
        console.error(e);
        $("orgDeleteErr").textContent = e?.message || "Could not inspect linked data.";
      } finally {
        $("orgDeleteConfirmBtn").disabled = false;
        $("orgDeleteConfirmBtn").textContent = "Delete Organization";
      }
    }

    function closeOrgDeleteModal() {
      pendingOrgDelete = null;
      $("orgDeleteModalBackdrop").classList.remove("is-open");
      $("orgDeleteModalBackdrop").setAttribute("aria-hidden", "true");
    }

    async function softDeleteOrganization(orgId) {
      const oid = String(orgId || "").trim();
      if (!oid) return;
      const confirmBtn = $("orgDeleteConfirmBtn");
      confirmBtn.disabled = true;
      confirmBtn.textContent = "Deleting…";
      $("orgDeleteErr").textContent = "";
      try {
        console.info("[dashboard] org delete permission", {
          selectedOrgId: oid,
          deletePermission: canDeleteOrganizations,
        });
        await updateDoc(doc(db, "organizations", oid), {
          active: false,
          deletedAt: serverTimestamp(),
        });
        console.info("[dashboard] org delete result", {
          selectedOrgId: oid,
          ok: true,
        });
      } catch (e) {
        console.error(e);
        $("orgDeleteErr").textContent = e?.message || "Could not delete organization.";
        confirmBtn.disabled = false;
        confirmBtn.textContent = "Delete Organization";
        return;
      }
      closeOrgDeleteModal();

      const orgSwitcher = $("orgSwitcher");
      const active = await listActiveOrganizations();
      orgSwitcher.innerHTML = "";
      for (const o of active) {
        const opt = document.createElement("option");
        opt.value = o.id;
        opt.textContent = o.label;
        orgSwitcher.appendChild(opt);
      }
      if (!active.length) {
        $("coursesHost").innerHTML = `<div class="empty">No active organizations found.</div>`;
        $("listHost").innerHTML = "";
        $("orgLine").textContent = "Platform admin · No active organizations";
        return;
      }
      orgSwitcher.value = active[0].id;
      try {
        sessionStorage.setItem(DASHBOARD_ADMIN_ORG_KEY, active[0].id);
        sessionStorage.setItem("orgId", active[0].id);
        sessionStorage.setItem("selectedOrgId", active[0].id);
        localStorage.setItem("selectedOrgId", active[0].id);
      } catch (_e) {}
      await Promise.all([renderCourses(active[0].id), renderList(active[0].id)]);
      $("adminBtn").href = `./admin.html?orgId=${encodeURIComponent(active[0].id)}`;
      const oSnap = await withFirestoreRetry(() => getDoc(doc(db, "organizations", active[0].id)));
      const oName = oSnap.exists() ? String(oSnap.data()?.name || "").trim() : "";
      $("orgLine").textContent = oName
        ? `Platform admin · ${oName}`
        : `Platform admin · Selected organization`;
    }

    async function softDeleteCourse(orgId, courseRow) {
      $("courseDeleteErr").textContent = "";
      const confirmBtn = $("courseDeleteConfirmBtn");
      confirmBtn.disabled = true;
      confirmBtn.textContent = "Checking…";
      try {
        const tSnap = await withFirestoreRetry(() => getDocs(orgTournamentsCollection(db, orgId)));
        let linkedActive = 0;
        tSnap.forEach((d) => {
          const t = d.data() || {};
          if (t.archived === true) return;
          if (isCourseLinkedToTournament(t, courseRow.id)) linkedActive += 1;
        });
        if (linkedActive > 0) {
          $("courseDeleteErr").textContent =
            "This course is linked to active tournaments. Archive or remove those tournaments first.";
          confirmBtn.disabled = false;
          confirmBtn.textContent = "Delete Course";
          return;
        }

        confirmBtn.textContent = "Deleting…";
        await updateDoc(courseDocRef(db, orgId, courseRow.id), {
          active: false,
          deletedAt: serverTimestamp(),
        });

        closeCourseDeleteModal();
        await renderCourses(orgId);
      } catch (e) {
        console.error(e);
        $("courseDeleteErr").textContent = e?.message || "Could not delete this course.";
        confirmBtn.disabled = false;
        confirmBtn.textContent = "Delete Course";
      }
    }

    async function archiveTournament(orgId, tournamentId, name) {
      const label = name || tournamentId;
      if (!confirm(`Archive "${label}"?\n\nIt will be hidden from the default list. You can still open it from Show archived.`)) {
        return;
      }
      try {
        await updateDoc(tournamentDocRef(db, orgId, tournamentId), { archived: true });
        await renderList(orgId);
      } catch (e) {
        console.error(e);
        $("err").textContent = e?.message || "Could not archive tournament.";
      }
    }

    async function deleteTournament(orgId, tournamentId, name) {
      const label = name || tournamentId;
      const msg =
        `PERMANENT DELETE: "${label}"\n\n` +
        `This will remove the tournament and all registrations, score submissions, and alerts. This cannot be undone.\n\n` +
        `Type DELETE to confirm.`;
      const typed = prompt(msg, "");
      if (typed !== "DELETE") {
        if (typed !== null) alert('Cancelled. You must type DELETE in all caps to confirm.');
        return;
      }
      $("err").textContent = "";
      try {
        await deleteTournamentCallable({
          orgId,
          organizationId: orgId,
          tournamentId,
        });
        await renderList(orgId);
      } catch (e) {
        console.error(e);
        const code = e?.code || "";
        const m = e?.message || String(e);
        $("err").textContent = code ? `${code}: ${m}` : m;
      }
    }

    function persistCourseSelection(orgId, courseId) {
      try {
        sessionStorage.setItem("selectedOrgId", orgId);
        sessionStorage.setItem("selectedCourseId", courseId);
        localStorage.setItem("selectedOrgId", orgId);
        localStorage.setItem("selectedCourseId", courseId);
      } catch (_e) {}
    }

    function renderCourseCard(orgId, row) {
      const oid = String(orgId || "").trim();
      const div = document.createElement("div");
      div.className = "item";

      const titleRow = document.createElement("div");
      titleRow.className = "item-title-row";
      const h2 = document.createElement("h2");
      h2.textContent = row.name || "Course";
      titleRow.appendChild(h2);
      div.appendChild(titleRow);

      const actions = document.createElement("div");
      actions.className = "card-actions";
      const q = new URLSearchParams();
      if (oid) q.set("orgId", oid);
      q.set("courseId", row.id);
      const courseQs = q.toString();

      const createT = document.createElement("a");
      createT.className = "btn btn-sm btn-blue";
      createT.href = `./admin.html?${courseQs}`;
      createT.textContent = "Create Tournament";
      createT.addEventListener("click", () => persistCourseSelection(oid, row.id));
      actions.appendChild(createT);

      const editC = document.createElement("a");
      editC.className = "btn btn-sm btn-ghost";
      editC.href = `./edit-course.html?${courseQs}`;
      editC.textContent = "Edit Course";
      editC.addEventListener("click", () => {
        persistCourseSelection(oid, row.id);
        console.info("[dashboard] Edit Course navigation", {
          selectedOrgId: oid,
          selectedCourseId: row.id,
          href: editC.href,
        });
      });
      actions.appendChild(editC);

      if (canDeleteCourses) {
        const delCourse = document.createElement("button");
        delCourse.type = "button";
        delCourse.className = "btn btn-sm btn-course-delete";
        delCourse.textContent = "Delete Course";
        delCourse.addEventListener("click", () => openCourseDeleteModal(oid, row));
        actions.appendChild(delCourse);
      }

      div.appendChild(actions);
      return div;
    }

    async function renderCourses(orgId) {
      const oid = String(orgId || "").trim();
      if (!oid) return;
      const host = $("coursesHost");
      host.innerHTML = "";
      const snap = await withFirestoreRetry(() => getDocs(orgCoursesCollection(db, oid)));
      if (snap.empty) {
        host.innerHTML = `
          <div class="empty">
            No courses yet. Add your first course to use it for tournaments and scoring.
            <a class="btn btn-sm" href="./create-course.html">Add a course</a>
          </div>`;
        return;
      }

      const rows = [];
      snap.forEach((d) => {
        const t = d.data() || {};
        if (t.active === false) return;
        rows.push({ id: d.id, name: t.name });
      });
      if (!rows.length) {
        host.innerHTML = `
          <div class="empty">
            No courses yet. Add your first course to use it for tournaments and scoring.
            <a class="btn btn-sm" href="./create-course.html">Add a course</a>
          </div>`;
        return;
      }
      rows.sort((a, b) => String(a.name || a.id).localeCompare(String(b.name || b.id)));

      for (const r of rows) {
        host.appendChild(renderCourseCard(oid, r));
      }
    }

    function renderCard(orgId, r) {
      const div = document.createElement("div");
      div.className = "item" + (r.archived ? " item--archived" : "");

      const titleRow = document.createElement("div");
      titleRow.className = "item-title-row";
      const h2 = document.createElement("h2");
      h2.textContent = r.name;
      titleRow.appendChild(h2);
      if (r.archived) {
        const badge = document.createElement("span");
        badge.className = "archived-badge";
        badge.textContent = "Archived";
        titleRow.appendChild(badge);
      }
      div.appendChild(titleRow);

      const sub = document.createElement("div");
      sub.className = "sub";
      sub.innerHTML = `ID: <code>${escapeHtml(r.id)}</code>${r.date ? ` · ${escapeHtml(r.date)}` : ""}`;
      div.appendChild(sub);

      const links = document.createElement("div");
      links.className = "links";
      const a = (href, text) => {
        const el = document.createElement("a");
        el.href = href;
        el.textContent = text;
        return el;
      };
      links.appendChild(a(r.links.scorecard, "Scorecard"));
      links.appendChild(a(r.links.leaderboard, "Leaderboard"));
      links.appendChild(a(r.links.roster, "Roster"));
      links.appendChild(a(r.links.register, "Registration"));
      const adminA = a(`./admin.html?id=${encodeURIComponent(r.id)}&orgId=${encodeURIComponent(orgId)}`, "Admin");
      adminA.addEventListener("click", () => {
        try {
          localStorage.setItem(`${ADMIN_LAST_TOURNAMENT_KEY}_${orgId}`, r.id);
        } catch (_e) {}
      });
      links.appendChild(adminA);
      div.appendChild(links);

      const actions = document.createElement("div");
      actions.className = "card-actions";

      if (!r.archived) {
        const ar = document.createElement("button");
        ar.type = "button";
        ar.className = "btn btn-sm btn-archive";
        ar.textContent = "Archive";
        ar.addEventListener("click", () => archiveTournament(orgId, r.id, r.name));
        actions.appendChild(ar);
      }

      const del = document.createElement("button");
      del.type = "button";
      del.className = "btn btn-sm btn-danger";
      del.textContent = "Delete permanently";
      del.addEventListener("click", () => deleteTournament(orgId, r.id, r.name));
      actions.appendChild(del);

      div.appendChild(actions);
      return div;
    }

    async function renderList(orgId) {
      const oid = String(orgId || "").trim();
      if (!oid) return;
      cachedOrgId = oid;
      const host = $("listHost");
      host.innerHTML = "";
      const col = orgTournamentsCollection(db, oid);
      const snap = await withFirestoreRetry(() => getDocs(col));
      if (snap.empty) {
        host.innerHTML = `<div class="empty">No tournaments yet. Open <b>Tournament admin</b> and click <b>Create New Tournament</b>.</div>`;
        return;
      }

      const rows = [];
      snap.forEach((d) => {
        const t = d.data() || {};
        const archived = t.archived === true;
        const name = t.tournamentName || t.name || d.id;
        const date = t.eventDate || t.date || "";
        const links = tournamentLinks(oid, d.id);
        rows.push({ id: d.id, name, date, links, archived });
      });
      rows.sort((a, b) => String(b.id).localeCompare(String(a.id)));

      const visible = showArchived ? rows : rows.filter((r) => !r.archived);

      if (!visible.length) {
        const hasArchived = rows.some((r) => r.archived);
        host.innerHTML = hasArchived
          ? `<div class="empty">No active tournaments. Turn on <b>Show archived</b> to see archived tournaments.</div>`
          : `<div class="empty">No tournaments yet. Open <b>Tournament admin</b> and click <b>Create New Tournament</b>.</div>`;
        return;
      }

      for (const r of visible) {
        host.appendChild(renderCard(oid, r));
      }
    }

    $("logoutBtn").addEventListener("click", async () => {
      await signOut(auth);
      window.location.href = "./login.html";
    });

    const showArchivedToggle = $("showArchivedToggle");
    showArchivedToggle.addEventListener("change", async () => {
      showArchived = showArchivedToggle.checked;
      if (cachedOrgId) {
        try {
          await renderList(cachedOrgId);
        } catch (e) {
          console.error(e);
          $("err").textContent = e?.message || "Could not refresh list.";
        }
      }
    });

    onAuthStateChanged(auth, async (user) => {
      const errEl = $("err");
      errEl.textContent = "";
      if (!user) {
        console.info("[dashboard] redirect to login (no user)");
        window.location.href = "./login.html?next=" + encodeURIComponent("./dashboard.html");
        return;
      }

      console.info("[dashboard] auth uid:", user.uid);

      const platformBar = $("platformAdminBar");
      const orgSwitcher = $("orgSwitcher");

      try {
        await auth.authStateReady();

        let { role, orgId } = await readDashboardAuthContext(db, user.uid);
        let resolved = { ok: false, message: "No organization is linked to this account." };
        if (!orgId) {
          resolved = await resolveOrganizerOrgId(app, auth, db);
          orgId = resolved && (resolved.orgId || resolved.organizationId) || "";
        }

        const platformAdmin = isPlatformAdminRole(role);
        canDeleteCourses = platformAdmin;
        canDeleteOrganizations = platformAdmin;
        console.info("[dashboard] role:", role || "(none)", "platformAdmin:", platformAdmin);

        if (platformAdmin) {
          platformBar.classList.add("is-visible");
          $("coursesSectionTitle").textContent = "Courses (selected organization)";
          $("tournamentsSectionTitle").textContent = "Tournaments (selected organization)";

          let orgOptions;
          try {
            orgOptions = await listActiveOrganizations();
          } catch (e) {
            console.error(e);
            errEl.textContent = e?.message || "Could not load organizations.";
            return;
          }
          if (!orgOptions.length) {
            errEl.textContent = "No active organizations found.";
            orgSwitcher.innerHTML = "";
            return;
          }

          let saved = "";
          try {
            saved = String(sessionStorage.getItem(DASHBOARD_ADMIN_ORG_KEY) || "").trim();
          } catch (_e) {}

          orgSwitcher.innerHTML = "";
          for (const o of orgOptions) {
            const opt = document.createElement("option");
            opt.value = o.id;
            opt.textContent = o.label;
            orgSwitcher.appendChild(opt);
          }

          const firstId = orgOptions[0].id;
          const pick = orgOptions.some((o) => o.id === saved) ? saved : firstId;
          orgSwitcher.value = pick;

          const applyPlatformOrg = async () => {
            const v = String(orgSwitcher.value || "").trim();
            if (!v) return;
            errEl.textContent = "";
            try {
              sessionStorage.setItem(DASHBOARD_ADMIN_ORG_KEY, v);
              sessionStorage.setItem("orgId", v);
            } catch (_e) {}
            let oName = "";
            try {
              const oSnap = await withFirestoreRetry(() => getDoc(doc(db, "organizations", v)));
              oName = oSnap.exists() ? String(oSnap.data()?.name || "").trim() : "";
            } catch (e) {
              console.warn("[dashboard] org name read failed", e);
            }
            $("orgLine").textContent = oName
              ? `Platform admin · ${oName}`
              : `Platform admin · Selected organization`;
            $("adminBtn").href = `./admin.html?orgId=${encodeURIComponent(v)}`;
            try {
              sessionStorage.setItem("selectedOrgId", v);
              localStorage.setItem("selectedOrgId", v);
            } catch (_e) {}
            try {
              await user.getIdToken(true);
              await Promise.all([renderCourses(v), renderList(v)]);
            } catch (e) {
              console.error(e);
              errEl.textContent = isOfflineLikeFirestoreError(e)
                ? "Can't load data while offline. Try again when your connection is stable."
                : e?.message || "Could not load courses or tournaments.";
            }
          };

          orgSwitcher.onchange = () => applyPlatformOrg();
          await applyPlatformOrg();
          return;
        }

        platformBar.classList.remove("is-visible");
        canDeleteCourses = false;
        canDeleteOrganizations = false;
        $("coursesSectionTitle").textContent = "Your courses";
        $("tournamentsSectionTitle").textContent = "Your tournaments";

        const scopedOrgId = String(orgId || "").trim();
        console.info("[dashboard] scopedOrgId (org-only):", scopedOrgId || "(empty)");

        if (!scopedOrgId) {
          errEl.textContent =
            (resolved && resolved.message) ||
            "No organization is linked to this account.";
          return;
        }

        try {
          sessionStorage.setItem("orgId", scopedOrgId);
        } catch (_e) {}

        let orgName = "";
        try {
          const oSnap = await withFirestoreRetry(() =>
            getDoc(doc(db, "organizations", scopedOrgId))
          );
          const oData = oSnap.exists() ? (oSnap.data() || {}) : null;
          if (oData && oData.active === false) {
            errEl.textContent = "This organization is inactive.";
            $("coursesHost").innerHTML = "";
            $("listHost").innerHTML = "";
            return;
          }
          orgName = oData ? String(oData.name || "") : "";
        } catch (e) {
          console.warn("[dashboard] organization name read failed", e);
          if (isOfflineLikeFirestoreError(e)) {
            errEl.textContent =
              "You're offline or the connection dropped. Organization name may not show until you're back online.";
          }
        }
        $("orgLine").textContent = orgName ? orgName : "Your organization";

        $("adminBtn").href = `./admin.html?orgId=${encodeURIComponent(scopedOrgId)}`;
        try {
          sessionStorage.setItem("selectedOrgId", scopedOrgId);
          localStorage.setItem("selectedOrgId", scopedOrgId);
        } catch (_e) {}

        try {
          await user.getIdToken(true);
          await Promise.all([renderCourses(scopedOrgId), renderList(scopedOrgId)]);
        } catch (e) {
          console.error(e);
          errEl.textContent = isOfflineLikeFirestoreError(e)
            ? "Can't load the tournament list while offline. Try again when your connection is stable."
            : e?.message || "Could not load tournaments.";
        }
      } catch (e) {
        console.error("[dashboard] profile / org load error:", e);
        errEl.textContent = e?.message || "Could not load your profile.";
      }
    });

    $("courseDeleteCancelBtn").addEventListener("click", closeCourseDeleteModal);
    $("courseDeleteModalBackdrop").addEventListener("click", (ev) => {
      if (ev.target === $("courseDeleteModalBackdrop")) closeCourseDeleteModal();
    });
    $("courseDeleteConfirmBtn").addEventListener("click", async () => {
      if (!pendingCourseDelete) return;
      await softDeleteCourse(pendingCourseDelete.orgId, pendingCourseDelete.row);
    });
    $("orgDeleteCancelBtn").addEventListener("click", closeOrgDeleteModal);
    $("orgDeleteModalBackdrop").addEventListener("click", (ev) => {
      if (ev.target === $("orgDeleteModalBackdrop")) closeOrgDeleteModal();
    });
    $("orgDeleteConfirmBtn").addEventListener("click", async () => {
      if (!pendingOrgDelete || !canDeleteOrganizations) return;
      await softDeleteOrganization(pendingOrgDelete.orgId);
    });
    $("deleteOrgBtn").addEventListener("click", async () => {
      if (!canDeleteOrganizations) return;
      const selectedOrgId = String($("orgSwitcher").value || "").trim();
      console.info("[dashboard] selected org for delete", { selectedOrgId });
      await openOrgDeleteModal(selectedOrgId);
    });
  </script>
</body>
</html>
