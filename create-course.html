<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Add your first course</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Barlow:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#d9d1c2; --ink:#2f2a26; --line:#9a6217; --green:#2f7a31; --blue:#12356f; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: Barlow, system-ui, sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { width: min(480px, 100%); background: rgba(255,255,255,.2); border: 4px solid rgba(154,98,23,.45); border-radius: 24px; padding: 28px; }
    h1 { font-family: Cinzel, serif; font-size: 1.5rem; margin: 0 0 8px; }
    p { margin: 0 0 18px; color: #4b4631; font-size: 1rem; line-height: 1.4; }
    label { display: block; font-weight: 800; margin-bottom: 6px; font-size: 0.95rem; }
    input { width: 100%; padding: 14px 16px; border-radius: 16px; border: 3px solid var(--line); font-size: 1.05rem; margin-bottom: 14px; font-family: inherit; }
    .btn { width: 100%; padding: 16px; border: none; border-radius: 16px; font-size: 1.1rem; font-weight: 900; cursor: pointer; font-family: inherit; background: var(--green); color: #fff; margin-top: 8px; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-secondary { background: var(--blue); margin-top: 12px; text-decoration: none; display: block; text-align: center; line-height: 1.3; }
    .err { color: #a32; font-weight: 700; font-size: 0.95rem; margin-top: 8px; min-height: 1.4em; }
    .hint { font-size: 0.88rem; color: #5f5851; margin: -8px 0 14px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Add your first course</h1>
    <p>This is saved to your organization. You can add scoring details and tournaments later from the admin. Legacy Cypresswood links and tournaments are unchanged.</p>
    <form id="form">
      <label for="courseName">Course name</label>
      <input id="courseName" type="text" required autocomplete="organization" placeholder="e.g. North Nine, Championship Course" />

      <label for="logoUrl">Logo URL (optional)</label>
      <div class="hint">HTTPS link to a PNG or SVG hosted online.</div>
      <input id="logoUrl" type="url" inputmode="url" placeholder="https://..." />

      <label for="primaryColor">Primary color (optional)</label>
      <div class="hint">CSS color, e.g. #2f7a31 or rgb(47,122,49)</div>
      <input id="primaryColor" type="text" placeholder="#9a6217" />

      <label for="website">Website (optional)</label>
      <input id="website" type="url" inputmode="url" placeholder="https://yourclub.com" />

      <button type="submit" class="btn" id="submitBtn">Save and continue</button>
      <div class="err" id="err"></div>
    </form>
    <a class="btn btn-secondary" href="./dashboard.html" id="skipLink">Skip for now</a>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore,
      doc,
      getDocs,
      setDoc,
      serverTimestamp,
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { firebaseConfig } from "./js/firebase-config.js";
    import { orgCoursesCollection } from "./js/org-paths.js";
    import { resolveOrganizerOrgId } from "./js/resolve-organizer-org.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const $ = (id) => document.getElementById(id);
    const form = $("form");
    const errEl = $("err");
    const submitBtn = $("submitBtn");
    const skipLink = $("skipLink");

    let orgId = "";
    let ready = false;

    function safeText(v) {
      return String(v || "").trim();
    }

    onAuthStateChanged(auth, async (user) => {
      errEl.textContent = "";
      if (!user) {
        window.location.href = "./login.html?next=" + encodeURIComponent("./create-course.html");
        return;
      }

      const resolved = await resolveOrganizerOrgId(app, auth, db);
      if (!resolved.ok) {
        errEl.textContent =
          resolved.message ||
          "Your organizer profile could not be loaded. Try signing in again, or complete first-time signup.";
        form.style.display = "none";
        skipLink.style.display = "none";
        return;
      }

      orgId = resolved.orgId;
      if (!orgId) {
        errEl.textContent = "No organization linked to this account.";
        form.style.display = "none";
        skipLink.href = "./signup.html";
        skipLink.textContent = "Create an organization";
        return;
      }

      try {
        const coursesSnap = await getDocs(orgCoursesCollection(db, orgId));
        if (!coursesSnap.empty) {
          window.location.href = "./dashboard.html";
          return;
        }
      } catch (e) {
        console.error(e);
        errEl.textContent = e?.message || "Could not check existing courses.";
        return;
      }

      ready = true;
    });

    skipLink.addEventListener("click", (e) => {
      if (!orgId) return;
      e.preventDefault();
      window.location.href = "./dashboard.html";
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errEl.textContent = "";
      if (!ready || !orgId) {
        errEl.textContent = "Still loading. Please wait.";
        return;
      }

      const courseName = safeText($("courseName").value);
      if (!courseName) {
        errEl.textContent = "Course name is required.";
        return;
      }

      const logoUrl = safeText($("logoUrl").value);
      const primaryColor = safeText($("primaryColor").value);
      const website = safeText($("website").value);

      submitBtn.disabled = true;
      try {
        const newRef = doc(orgCoursesCollection(db, orgId));
        const payload = {
          name: courseName,
          createdAt: serverTimestamp(),
        };
        if (logoUrl) payload.logoUrl = logoUrl;
        if (primaryColor) payload.primaryColor = primaryColor;
        if (website) payload.website = website;

        await setDoc(newRef, payload);
        window.location.href = "./dashboard.html";
      } catch (e2) {
        console.error(e2);
        errEl.textContent = e2?.message || String(e2);
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
