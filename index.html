<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Cypresswood Scorecard</title>

  <link rel="manifest" href="./manifest.webmanifest">
  <meta name="theme-color" content="#7a4a0b">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Scorecard">
  <link rel="apple-touch-icon" href="./assets/icon-192.png">

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --paper:#e9e2d4;
      --ink:#111;
      --grid:#2b2b2b;
      --headerRow:#d8d1c3;
      --parRow:#a85a13;
      --parRowText:#fff;
      --hcpRow:#f2e6b9;
      --cellBg:#f8f4ea;
      --border:#7a4a0b;
      --card:#efe7d7;
      --chip:#ffffff55;
      --navy:#0d2a55;
      --navy2:#0b2246;
      --green:#2f6b2f;
      --danger:#b6422d;
    }

    *{ -webkit-tap-highlight-color: transparent; box-sizing:border-box; }

    body{
      margin:0;
      background: var(--paper);
      color: var(--ink);
      font-family: Georgia, 'Times New Roman', serif;
    }

    .wrap{
      max-width: 980px;
      margin: 0 auto;
      padding: 10px 10px 24px;
    }

    .card{
      background: var(--card);
      border: 3px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 22px rgba(0,0,0,.18);
    }

    .header-img{
      width: 100%;
      height: auto !important;
      max-height: 210px;
      display: block;
      object-fit: contain !important;
      object-position: center !important;
      background: var(--card);
    }

    #teamPickerScreen{
      display:none;
      padding:12px 10px;
      background: var(--card);
      border-bottom:1px solid rgba(0,0,0,.08);
    }

    .team-picker-top{
      display:grid;
      gap:8px;
    }

    .team-picker-title{
      font-family:Cinzel,serif;
      font-weight:900;
      font-size:16px;
    }

    .team-picker-meta{
      font-size:13px;
      opacity:.85;
      line-height:1.35;
    }

    .team-picker-search{
      margin-top:10px;
      display:grid;
      gap:10px;
    }

    .team-picker-search input{
      width:100%;
      padding:12px 10px;
      border:2px solid #7a4a0b;
      border-radius:10px;
      background:#fff;
      font-size:16px;
      font-weight:800;
      color:#111;
    }

    .team-list{
      display:grid;
      gap:10px;
      margin-top:10px;
    }

    .team-card{
      border:2px solid rgba(122,74,11,.18);
      border-radius:12px;
      background: rgba(255,255,255,.55);
      padding:12px;
      display:grid;
      gap:8px;
      cursor:pointer;
    }

    .team-card:active{
      transform: translateY(1px);
    }

    .team-card-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .team-card-name{
      font-family:Cinzel,serif;
      font-weight:900;
      font-size:14px;
      letter-spacing:.04em;
      text-transform:uppercase;
    }

    .team-card-hole{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:6px 10px;
      border-radius:999px;
      border:2px solid rgba(122,74,11,.18);
      background:#fff;
      font-weight:900;
      font-size:12px;
      letter-spacing:.06em;
      text-transform:uppercase;
    }

    .team-card-players{
      font-size:13px;
      line-height:1.35;
      font-weight:800;
      color:rgba(0,0,0,.82);
    }

    .team-picker-empty{
      margin-top:10px;
      padding:12px;
      border-radius:12px;
      border:2px dashed rgba(0,0,0,.16);
      background: rgba(255,255,255,.40);
      font-weight:900;
      font-size:13px;
      display:none;
    }

    #joinScreen{
      display:none;
      padding:12px 10px;
      background: var(--card);
      border-bottom:1px solid rgba(0,0,0,.08);
    }

    .team-mates-block{
      display:grid;
      gap:8px;
      margin-top:10px;
      padding:10px;
      border:2px dashed rgba(0,0,0,.18);
      border-radius:12px;
      background: rgba(255,255,255,.35);
    }

    .team-mates-block label{
      font-weight:900;
      font-size:13px;
      display:block;
    }

    .team-mates-block input{
      width:100%;
      padding:12px 10px;
      border:2px solid #7a4a0b;
      border-radius:10px;
      background:#fff;
      margin-top:6px;
      font-size:16px;
      font-weight:800;
    }

    #scoreSponsor{
      display:none;
      margin: 10px 10px 0;
      border:2px solid rgba(0,0,0,.14);
      border-radius:12px;
      background:rgba(255,255,255,.55);
      padding:10px 12px;
      cursor:pointer;
    }

    #scoreSponsor:active{ transform: translateY(1px); }

    #scoreSponsorTitle{
      font-family:Cinzel,serif;
      font-weight:900;
      font-size:13px;
      opacity:.9;
    }

    #scoreSponsorRow{
      display:flex;
      align-items:center;
      gap:10px;
      margin-top:8px;
    }

    #scoreSponsorLogo{
      width:44px;
      height:44px;
      border-radius:10px;
      object-fit:cover;
      border:2px solid rgba(0,0,0,.12);
      background:rgba(0,0,0,.06);
      display:none;
    }

    #scoreSponsorName{
      font-weight:900;
      font-size:16px;
    }

    .coursebar{
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap:10px;
      padding: 8px 10px;
      background: var(--card);
      border-top: 1px solid rgba(0,0,0,.08);
      border-bottom: 1px solid rgba(0,0,0,.08);
    }

    .course-title{
      font-family:'Cinzel', serif;
      font-weight: 900;
      letter-spacing: .5px;
      font-size: 14px;
      line-height: 1.1;
    }

    .course-hint{
      font-size: 12px;
      opacity:.8;
    }

    .course-select{
      border: 2px solid var(--border);
      background: #e7ddcb;
      border-radius: 10px;
      padding: 8px 10px;
      font-weight: 900;
      font-size: 14px;
    }

    .table-shell{ padding: 0px; background: var(--card); }

    .hint{
      padding: 8px 12px 0;
      font-size: 13px;
      opacity:.85;
    }

    .lockBanner{
      display:none;
      margin: 10px 10px 0;
      padding: 10px 12px;
      border:2px solid rgba(122,74,11,.20);
      border-radius:12px;
      background: rgba(255,255,255,.62);
      font-weight: 900;
      font-size: 13px;
      line-height: 1.35;
    }

    .lockBanner.show{ display:block; }

    .lockedStage{
      opacity:.68;
      filter: saturate(.88);
    }

    .scroll-x{
      overflow-x: auto;
      overflow-y: visible;
      -webkit-overflow-scrolling: touch;
      border: 2px solid var(--border);
      border-radius: 10px;
      background: rgba(255,255,255,.12);
      margin: 10px 10px 0;
      width: calc(100% - 20px);
      box-sizing: border-box;
    }

    table{
      border-collapse: collapse;
      min-width: 1120px;
      width: 100%;
    }

    th, td{
      border: 2px solid var(--grid);
      padding: 0;
      height: 36px;
      background: var(--cellBg);
    }

    .label,
    thead th{
      font-family: 'Cinzel', serif;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .label{
      width: 140px;
      font-weight: 900;
      padding: 0 10px;
      text-align: left;
      background: #e1d8c8;
      white-space: nowrap;
    }

    thead th{
      position: sticky;
      top: 0;
      z-index: 5;
      background: var(--headerRow);
      font-weight: 900;
      height: 44px;
      text-align:center;
      box-shadow: inset 0 -2px 0 rgba(0,0,0,.18);
    }

    .hole{ width: 44px; text-align:center; font-weight: 900; }
    .sum{ width: 60px; text-align:center; font-weight: 900; }

    .yard{
      text-align:center;
      font-family: Georgia, 'Times New Roman', serif;
      font-weight: 900;
      font-size: 16px;
      font-variant-numeric: tabular-nums;
    }

    .row-black td{ background:#0d2a55; color:#fff; }
    .row-blue  td{ background:#1f5ea8; color:#fff; }
    .row-white td{ background:#f7f7f7; color:#111; }
    .row-silver td{ background:#cfcfcf; color:#111; }
    .row-forest td{ background:#1f4f3a; color:#fff; }
    .row-copper td{ background:#a85a13; color:#fff; }

    .row-black .label{ background:#0b2246; color:#fff; }
    .row-blue  .label{ background:#174c89; color:#fff; }
    .row-white .label{ background:#f0f0f0; color:#111; }
    .row-silver .label{ background:#bdbdbd; color:#111; }
    .row-forest .label{ background:#163a2b; color:#fff; }
    .row-copper .label{ background:#8f4b10; color:#fff; }

    .row-par td{ background: var(--parRow); color: var(--parRowText); }
    .row-par .label{ background: #8f4b10; color:#fff; }

    .row-hcp td{ background: var(--hcpRow); color:#111; }
    .row-hcp .label{ background: #e9dcaa; }

    .score-input{
      width: 100%;
      height: 100%;
      border: 0;
      outline: none;
      background: rgba(255,255,255,.35) !important;
      text-align: center;
      font-weight: 950;
      font-size: 18px;
      color: #111;
      -webkit-appearance: none;
      appearance: none;
      font-family: Georgia, 'Times New Roman', serif;
      font-variant-numeric: tabular-nums;
    }

    td:has(.score-input){
      background: linear-gradient(to bottom, rgba(255,255,255,.45), rgba(255,255,255,.15));
    }

    .score-input:focus{
      box-shadow: inset 0 0 0 2px rgba(122,74,11,.55);
      background: rgba(255,255,255,.55) !important;
    }

    .player-name{
      width: 100%;
      height: 100%;
      border: 0;
      outline: none;
      background: transparent !important;
      font-weight: 950;
      padding: 0 10px;
      font-size: 16px;
      font-family: Georgia, 'Times New Roman', serif;
      -webkit-appearance: none;
      appearance: none;
    }

    .player-name:focus{
      box-shadow: inset 0 0 0 2px rgba(122,74,11,.35);
      border-radius: 8px;
      background: rgba(255,255,255,.35) !important;
    }

    .total{
      text-align:center;
      font-weight: 1000;
      font-size: 18px;
      background:#f1eadb;
      font-family: Georgia, 'Times New Roman', serif;
      font-variant-numeric: tabular-nums;
    }

    .sidegames{
      display:none;
      margin: 12px 10px 0;
      padding: 12px;
      border: 2px dashed rgba(0,0,0,.18);
      border-radius: 12px;
      background: rgba(255,255,255,.38);
    }

    .sidegames.show{ display:block; }

    .sidegames-title{
      font-family:Cinzel,serif;
      font-weight:900;
      font-size:15px;
      letter-spacing:.04em;
    }

    .sidegames-note{
      margin-top:6px;
      font-size:12px;
      opacity:.82;
      font-weight:800;
      line-height:1.35;
    }

    .sidegames-grid{
      display:grid;
      gap:12px;
      margin-top:12px;
    }

    .sidegame-block{
      border:2px solid rgba(122,74,11,.14);
      border-radius:12px;
      background: rgba(255,255,255,.58);
      padding:10px;
      display:grid;
      gap:10px;
    }

    .sidegame-block-title{
      font-family:Cinzel,serif;
      font-weight:900;
      font-size:13px;
      letter-spacing:.04em;
      text-transform:uppercase;
    }

    .sidegame-row{
      display:grid;
      grid-template-columns: 120px 1fr;
      gap:10px;
      align-items:center;
    }

    .sidegame-hole{
      font-weight:900;
      font-size:13px;
    }

    .sidegame-select{
      width:100%;
      border:2px solid var(--border);
      border-radius:10px;
      background:#fff;
      padding:10px;
      font-weight:900;
      font-size:15px;
    }

    .actions{
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      padding: 12px 10px 14px;
      background: var(--card);
    }

    button{
      border: 2px solid var(--border);
      background: #e7ddcb;
      border-radius: 10px;
      padding: 12px 10px;
      font-weight: 900;
      font-size: 16px;
      cursor:pointer;
    }

    button:active{ transform: translateY(1px); }

    .book-btn{
      display:flex;
      align-items:center;
      justify-content:center;
      border: 2px solid var(--border);
      background: #2f6b2f;
      color:#fff;
      border-radius: 10px;
      padding: 12px 10px;
      font-weight: 900;
      font-size: 16px;
      text-decoration:none;
      text-align:center;
    }

    .book-btn:active{ transform: translateY(1px); }

    .danger{
      background:#b6422d;
      color:#fff;
      border-color:#7a2b20;
      grid-column: 1 / -1;
    }

    .mini{
      font-size: 14px;
      padding: 10px 10px;
      opacity: .95;
    }

    .legal{
      padding: 10px 12px 14px;
      border-top: 1px solid rgba(0,0,0,.10);
      background: rgba(255,255,255,.18);
      font-size: 12px;
      opacity: .9;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      justify-content: space-between;
    }

    .legal a{
      color: #3d2a09;
      font-weight: 900;
      text-decoration: none;
      border-bottom: 1px dashed rgba(61,42,9,.4);
    }

    .legal a:active{ transform: translateY(1px); }

    .legal .left{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      align-items:center;
    }

    .legal .right{ opacity:.9; }

    #finishRound{
      border:2px solid rgba(47,107,47,.35);
      background:rgba(47,107,47,.14);
      border-radius:12px;
      padding:10px 12px;
      font-weight:900;
      cursor:pointer;
    }

    button:disabled,
    select:disabled,
    input:disabled,
    textarea:disabled{
      cursor:not-allowed;
      opacity:.72;
    }

    @media (max-width: 620px){
      .sidegame-row{
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
