<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Edit course</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 24px; color: #2f2a26; background: #d9d1c2; }
    .card { max-width: 560px; margin: 0 auto; background: rgba(255,255,255,.5); border: 2px solid #9a6217; border-radius: 14px; padding: 18px; }
    .btn { display: inline-block; margin-top: 10px; padding: 10px 14px; border-radius: 10px; background: #2f7a31; color: #fff; text-decoration: none; font-weight: 700; }
  </style>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search || "");
      var courseId = String(params.get("courseId") || "").trim();
      var orgId = String(
        params.get("org") || params.get("orgId") || params.get("organizationId") || params.get("o") || ""
      ).trim();
      if (courseId) {
        var q = window.location.search || "";
        window.location.replace("create-course.html" + q);
        return;
      }
      var createHref = orgId
        ? "create-course.html?org=" +
          encodeURIComponent(orgId) +
          "&orgId=" +
          encodeURIComponent(orgId)
        : "create-course.html";
      document.addEventListener("DOMContentLoaded", function () {
        var msg = document.getElementById("msg");
        var btn = document.getElementById("createCourseBtn");
        if (msg) msg.textContent = "No course found. Please create a course first.";
        if (btn) btn.setAttribute("href", createHref);
      });
    })();
  </script>
</head>
<body>
  <div class="card">
    <p id="msg">Checking course…</p>
    <a id="createCourseBtn" class="btn" href="create-course.html">Create Course</a>
  </div>
</body>
</html>
