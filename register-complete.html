<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Tournament Registration</title>

  <meta name="theme-color" content="#d9d1c2" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800;900&family=Barlow:wght@500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#d9d1c2;
      --panel:#ece7dc;
      --panel-2:#e8e2d6;
      --ink:#2f2a26;
      --muted:#6c645c;
      --line:#9a6217;
      --line-soft:#d2cbc0;
      --white:#ffffff;
      --green:#2f7a31;
      --blue:#12356f;
      --shadow:0 8px 24px rgba(0,0,0,.06);
      --radius:26px;
      --radius-sm:18px;
    }

    *{ box-sizing:border-box; }
    html,body{ margin:0; padding:0; }
    body{
      background:var(--bg);
      color:var(--ink);
      font-family:"Barlow", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }

    .page{
      width:min(920px, calc(100vw - 22px));
      margin:18px auto 30px;
      background:rgba(255,255,255,.18);
      border:6px solid rgba(154,98,23,.45);
      border-radius:32px;
      padding:18px;
      box-shadow:var(--shadow);
    }

    .main-card{
      background:rgba(255,255,255,.18);
      border:3px solid rgba(154,98,23,.75);
      border-radius:28px;
      overflow:hidden;
    }

    .hero{
      padding:22px 20px 20px;
      border-bottom:2px solid rgba(0,0,0,.08);
      background:linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.06));
      text-align:center;
    }

    .course-brand{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:10px;
      margin-bottom:16px;
    }

    .course-logo-wrap{
      width:min(220px, 60vw);
      min-height:86px;
      border-radius:22px;
      border:3px solid rgba(154,98,23,.45);
      background:rgba(255,255,255,.32);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:14px;
      overflow:hidden;
    }

    .course-logo-wrap img{
      max-width:100%;
      max-height:76px;
      object-fit:contain;
      display:block;
    }

    .course-brand-name{
      font-family:"Cinzel", serif;
      font-size:clamp(18px, 3vw, 30px);
      font-weight:800;
      color:#2e2a28;
      line-height:1.02;
    }

    .event-title{
      margin:0;
      font-family:"Cinzel", serif;
      letter-spacing:.02em;
      color:#2e2a28;
      font-size:clamp(30px, 6vw, 58px);
      line-height:.98;
      font-weight:900;
    }

    .event-meta{
      margin:14px auto 0;
      max-width:760px;
      font-size:clamp(17px, 2.8vw, 28px);
      line-height:1.08;
      color:#4b4641;
      font-weight:700;
    }

    .hero-divider{
      width:100%;
      height:2px;
      margin:18px 0 16px;
      background:linear-gradient(90deg, transparent, rgba(154,98,23,.55), transparent);
    }

    .sponsor-hero{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:10px;
    }

    .sponsor-kicker{
      font-family:"Cinzel", serif;
      font-size:clamp(14px, 2.2vw, 20px);
      font-weight:800;
      letter-spacing:.05em;
      color:#6d5730;
    }

    .sponsor-logo-wrap{
      width:min(240px, 64vw);
      min-height:84px;
      border-radius:22px;
      border:3px solid rgba(154,98,23,.45);
      background:rgba(255,255,255,.34);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:14px;
      overflow:hidden;
    }

    .sponsor-logo-wrap img{
      max-width:100%;
      max-height:74px;
      object-fit:contain;
      display:block;
    }

    .sponsor-name{
      font-size:clamp(20px, 3.4vw, 34px);
      font-weight:900;
      color:#2d2824;
      line-height:1.04;
    }

    .sponsor-link{
      color:#1b5fc8;
      font-size:clamp(15px, 2.3vw, 18px);
      font-weight:800;
      text-decoration:none;
      word-break:break-word;
    }

    .content{
      padding:20px;
    }

    .notice{
      margin:0 0 18px;
      padding:16px 18px;
      border-radius:20px;
      border:3px solid rgba(154,98,23,.3);
      background:rgba(255,255,255,.26);
      font-size:clamp(17px, 2.4vw, 22px);
      font-weight:800;
      color:#4d463f;
      text-align:center;
    }

    .dash-box{
      margin:18px 0 0;
      padding:18px;
      border:4px dashed var(--line-soft);
      border-radius:28px;
      background:rgba(255,255,255,.22);
    }

    .dash-title{
      margin:0 0 14px;
      font-family:"Cinzel", serif;
      font-size:clamp(24px, 3.6vw, 42px);
      font-weight:900;
      letter-spacing:.02em;
      color:#2e2a28;
    }

    .field{
      margin:0 0 18px;
    }

    .label{
      display:block;
      margin:0 0 10px;
      font-family:"Cinzel", serif;
      font-weight:800;
      font-size:clamp(18px, 2.6vw, 28px);
      color:#1f1b18;
      letter-spacing:.01em;
    }

    .hint{
      margin:10px 0 0;
      color:#5f5851;
      font-size:clamp(14px, 2vw, 18px);
      line-height:1.15;
      font-weight:700;
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"],
    textarea{
      width:100%;
      min-height:72px;
      padding:18px 24px;
      border-radius:24px;
      border:4px solid var(--line);
      background:#f4f4f4;
      color:#1f1b18;
      font-size:clamp(20px, 3.1vw, 34px);
      font-weight:800;
      font-family:"Barlow", sans-serif;
      outline:none;
      box-shadow:none;
      appearance:none;
      -webkit-appearance:none;
    }

    textarea{
      min-height:110px;
      resize:vertical;
    }

    input::placeholder,
    textarea::placeholder{
      color:transparent;
      opacity:0;
    }

    .btn{
      width:100%;
      min-height:88px;
      border:none;
      border-radius:24px;
      font-family:"Barlow", sans-serif;
      font-size:clamp(24px, 4vw, 40px);
      font-weight:900;
      letter-spacing:.01em;
      cursor:pointer;
      padding:16px 18px;
      text-align:center;
      box-shadow:none;
      -webkit-tap-highlight-color:transparent;
    }

    .btn-green{ background:var(--green); color:#fff; }

    .fine-print{
      margin-top:16px;
      text-align:center;
      color:#635b53;
      font-size:clamp(14px, 2vw, 17px);
      line-height:1.15;
      font-weight:700;
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:22px;
      transform:translateX(-50%);
      background:#1f1f1f;
      color:#fff;
      padding:12px 18px;
      border-radius:999px;
      font-weight:800;
      font-size:16px;
      opacity:0;
      pointer-events:none;
      transition:opacity .2s ease, transform .2s ease;
      z-index:9999;
    }

    .toast.show{
      opacity:1;
      transform:translateX(-50%) translateY(-4px);
    }

    .hidden{ display:none !important; }
  </style>
</head>
<body>
  <div class="page">
    <div class="main-card">
      <section class="hero">
        <div class="course-brand" id="courseBrandWrap">
          <div class="course-logo-wrap hidden" id="courseLogoWrap">
            <img id="courseLogoImg" alt="Course logo">
          </div>
          <div class="course-brand-name" id="courseBrandName">Golf Tournament</div>
        </div>

        <h1 class="event-title" id="eventTitle">TOURNAMENT REGISTRATION</h1>
        <div class="event-meta" id="eventMeta">Team and player registration</div>

        <div class="hero-divider"></div>

        <div class="sponsor-hero" id="sponsorHeroWrap">
          <div class="sponsor-kicker">SPONSORED BY</div>
          <div class="sponsor-logo-wrap hidden" id="sponsorLogoWrap">
            <img id="sponsorLogoImg" alt="Sponsor logo">
          </div>
          <div class="sponsor-name" id="sponsorHeroName"></div>
          <a id="sponsorHeroLink" class="sponsor-link hidden" target="_blank" rel="noopener">Visit Sponsor</a>
        </div>
      </section>

      <section class="content">
        <div class="notice" id="topNotice">
          Enter as much or as little information as you want, then submit.
        </div>

        <div class="dash-box">
          <h2 class="dash-title">TEAM REGISTRATION</h2>

          <div class="field">
            <label class="label" for="teamName">Team / Company Name</label>
            <input id="teamName" type="text" />
          </div>

          <div class="field">
            <label class="label" for="captainName">Captain Name</label>
            <input id="captainName" type="text" />
          </div>

          <div class="field">
            <label class="label" for="player2">Player 2</label>
            <input id="player2" type="text" />
          </div>

          <div class="field">
            <label class="label" for="player3">Player 3</label>
            <input id="player3" type="text" />
          </div>

          <div class="field">
            <label class="label" for="player4">Player 4</label>
            <input id="player4" type="text" />
          </div>

          <div class="field">
            <label class="label" for="player5">Player 5</label>
            <input id="player5" type="text" />
          </div>

          <div class="field">
            <label class="label" for="player6">Player 6</label>
            <input id="player6" type="text" />
          </div>

          <div class="field">
            <label class="label" for="captainEmail">Captain Email</label>
            <input id="captainEmail" type="email" />
          </div>

          <div class="field">
            <label class="label" for="captainPhone">Captain Phone</label>
            <input id="captainPhone" type="tel" />
          </div>

          <div class="field">
            <label class="label" for="notes">Notes</label>
            <textarea id="notes"></textarea>
          </div>

          <button class="btn btn-green" id="submitRegistrationBtn" type="button">Submit Registration</button>

          <div class="fine-print" id="submitMessage">
            Your registration will be saved for this tournament.
          </div>
        </div>
              </section>
    </div>
  </div>

  <div class="toast" id="toast">Saved</div>

 <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore,
    doc,
    getDoc,
    collection,
    addDoc,
    getDocs,
    query,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBX2ycbIGEyQh-XgeOXtuhkyBT2XZvsHls",
    authDomain: "cypresswood-tournaments.firebaseapp.com",
    projectId: "cypresswood-tournaments",
    storageBucket: "cypresswood-tournaments.firebasestorage.app",
    messagingSenderId: "162441374966",
    appId: "1:162441374966:web:157285a2d5c39db1e810d7",
    measurementId: "G-HL6Y9CLV8K"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const $ = (id) => document.getElementById(id);

  const params = new URLSearchParams(location.search);
  const tournamentId = (params.get("id") || params.get("t") || "").trim();

  const state = {
    tournamentId,
    tournament: null
  };

  function showToast(msg){
    const el = $("toast");
    el.textContent = msg;
    el.classList.add("show");
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => el.classList.remove("show"), 1700);
  }

  function safeText(value, fallback=""){
    return String(value || fallback || "").trim();
  }

  function normalizeUrl(url){
    const raw = String(url || "").trim();
    if(!raw) return "";
    if(/^https?:\/\//i.test(raw)) return raw;
    if(raw.startsWith("//")) return location.protocol + raw;
    return raw;
  }

  function getTopSponsor(tournament){
    const sponsors = Array.isArray(tournament?.sponsors) ? tournament.sponsors : [];
    const active = sponsors
      .filter(s => s && s.active !== false)
      .sort((a,b)=>(Number(a.order ?? 999) - Number(b.order ?? 999)));

    if(active.length) return active[0];

    const legacyName = safeText(tournament?.sponsorName);
    const legacyLogo = safeText(tournament?.sponsorLogo);
    const legacyUrl  = safeText(tournament?.sponsorUrl);

    if(legacyName || legacyLogo || legacyUrl){
      return {
        name: legacyName,
        logoUrl: legacyLogo,
        website: legacyUrl
      };
    }

    return null;
  }

  function getCourseBranding(courseName){
    const name = safeText(courseName).toLowerCase();

    const map = {
      tradition: {
        brandName: "Tradition Course",
        logoUrl: ""
      },
      cypress: {
        brandName: "Cypress Course",
        logoUrl: ""
      }
    };

    return map[name] || {
      brandName: safeText(courseName, "Golf Course"),
      logoUrl: ""
    };
  }

  function setVisible(el, show){
    if(!el) return;
    el.classList.toggle("hidden", !show);
  }

  function renderCourseBrand(tournament){
    const courseName = safeText(tournament?.defaultCourse, "Golf Tournament");
    const customLogo = safeText(
      tournament?.courseLogoUrl ||
      tournament?.courseBrandLogoUrl ||
      tournament?.golfCourseLogoUrl
    );

    const branding = getCourseBranding(courseName);
    const logoUrl = normalizeUrl(customLogo || branding.logoUrl || "");

    $("courseBrandName").textContent = branding.brandName || courseName || "Golf Tournament";

    if(logoUrl){
      $("courseLogoImg").src = logoUrl;
      $("courseLogoImg").alt = `${courseName || "Course"} logo`;
      setVisible($("courseLogoWrap"), true);
    }else{
      $("courseLogoImg").removeAttribute("src");
      setVisible($("courseLogoWrap"), false);
    }
  }

  function renderSponsorHero(tournament){
    const sponsor = getTopSponsor(tournament);

    if(!sponsor){
      $("sponsorHeroName").textContent = "";
      $("sponsorHeroLink").removeAttribute("href");
      $("sponsorHeroLink").textContent = "";
      $("sponsorLogoImg").removeAttribute("src");
      setVisible($("sponsorLogoWrap"), false);
      setVisible($("sponsorHeroLink"), false);
      setVisible($("sponsorHeroWrap"), false);
      return;
    }

    const sponsorName = safeText(sponsor.name, "");
    const sponsorLogo = normalizeUrl(safeText(sponsor.logoUrl, ""));
    const sponsorUrl  = normalizeUrl(safeText(sponsor.website, ""));

    setVisible($("sponsorHeroWrap"), true);
    $("sponsorHeroName").textContent = sponsorName || "";

    if(sponsorLogo){
      $("sponsorLogoImg").src = sponsorLogo;
      $("sponsorLogoImg").alt = sponsorName ? `${sponsorName} logo` : "Sponsor logo";
      setVisible($("sponsorLogoWrap"), true);
    }else{
      $("sponsorLogoImg").removeAttribute("src");
      setVisible($("sponsorLogoWrap"), false);
    }

    if(sponsorUrl){
      $("sponsorHeroLink").href = sponsorUrl;
      $("sponsorHeroLink").textContent = sponsorUrl.replace(/^https?:\/\//i, "");
      setVisible($("sponsorHeroLink"), true);
    }else{
      $("sponsorHeroLink").removeAttribute("href");
      $("sponsorHeroLink").textContent = "";
      setVisible($("sponsorHeroLink"), false);
    }
  }

  function renderEventHeader(tournament){
    const title = safeText(tournament?.tournamentName || tournament?.name, "TOURNAMENT REGISTRATION");
    const date  = safeText(tournament?.eventDate || tournament?.date, "");
    const course = safeText(tournament?.defaultCourse, "");
    const format = safeText(tournament?.formatOfPlay, "");

    $("eventTitle").textContent = title;

    const parts = [date, course, format].filter(Boolean);
    $("eventMeta").textContent = parts.length ? parts.join(" • ") : "Team and player registration";

    renderCourseBrand(tournament);
    renderSponsorHero(tournament);
  }

  function renderMissingTournamentState(){
    $("eventTitle").textContent = "TOURNAMENT REGISTRATION";
    $("eventMeta").textContent = "Team and player registration";
    $("courseBrandName").textContent = "Golf Tournament";
    setVisible($("courseLogoWrap"), false);
    setVisible($("sponsorHeroWrap"), false);
    $("topNotice").textContent = "Enter as much or as little information as you want, then submit.";
  }

  async function loadTournament(){
    if(!state.tournamentId){
      state.tournament = null;
      renderMissingTournamentState();
      $("topNotice").textContent = "This registration link is missing a tournament id.";
      return;
    }

    try{
      const snap = await getDoc(doc(db, "tournaments", state.tournamentId));

      if(!snap.exists()){
        state.tournament = null;
        renderMissingTournamentState();
        $("topNotice").textContent = "This registration page is ready. Tournament details will appear when available.";
        return;
      }

      state.tournament = snap.data() || {};
      renderEventHeader(state.tournament);
      $("topNotice").textContent = "Enter as much or as little information as you want, then submit.";
    }catch(err){
      console.error(err);
      state.tournament = null;
      renderMissingTournamentState();
      $("topNotice").textContent = "Unable to load tournament details right now.";
    }
  }

  function getVal(id){
    const el = $(id);
    return el ? el.value.trim() : "";
  }

  function normalizePlayers(values){
    const out = [];
    const seen = new Set();

    values.forEach(v => {
      const n = safeText(v);
      if(!n) return;
      const key = n.toLowerCase();
      if(seen.has(key)) return;
      seen.add(key);
      out.push(n);
    });

    return out.slice(0, 6);
  }

  function normalizeHoleLabel(raw){
    const s = String(raw || "").trim().toUpperCase();
    if(!s) return "";
    const m = s.match(/^([1-9]|1[0-8])([A-Z])$/);
    if(!m) return "";
    return `${parseInt(m[1],10)}${m[2]}`;
  }

  function buildSlotSequence(maxWaves=12){
    const slots = [];
    for(let wave=0; wave<maxWaves; wave++){
      const letter = String.fromCharCode(65 + wave); // A, B, C...
      for(let hole=1; hole<=18; hole++){
        slots.push(`${hole}${letter}`);
      }
    }
    return slots;
  }

  async function getNextAvailableHole(tournamentId){
    const regCol = collection(db, "tournaments", tournamentId, "registrations");
    const snap = await getDocs(query(regCol));

    const used = new Set();

    snap.forEach(docSnap => {
      const x = docSnap.data() || {};
      const status = String(x.status || "").toLowerCase();
      if(status === "cancelled") return;

      const hole = normalizeHoleLabel(x.assignedHole || x.startHole || "");
      if(hole) used.add(hole);
    });

    const slots = buildSlotSequence(12);
    for(const slot of slots){
      if(!used.has(slot)) return slot;
    }
    return "";
  }

  function buildRegistrationPayload(assignedHole){
    const teamName = getVal("teamName");
    const captainName = getVal("captainName");
    const player2 = getVal("player2");
    const player3 = getVal("player3");
    const player4 = getVal("player4");
    const player5 = getVal("player5");
    const player6 = getVal("player6");

    const players = normalizePlayers([
      captainName,
      player2,
      player3,
      player4,
      player5,
      player6
    ]);

    return {
      tournamentId: state.tournamentId || "",
      tournamentName: safeText(state.tournament?.tournamentName || state.tournament?.name, ""),
      defaultCourse: safeText(state.tournament?.defaultCourse, ""),
      formatOfPlay: safeText(state.tournament?.formatOfPlay, ""),
      teamName,
      captainName,
      captainEmail: getVal("captainEmail"),
      captainPhone: getVal("captainPhone"),
      players,
      notes: getVal("notes"),
      assignedHole: assignedHole || "",
      status: assignedHole ? "assigned" : "registered",
      source: "register-complete",
      createdAt: serverTimestamp(),
      updatedAt: serverTimestamp()
    };
  }

  async function handleSubmit(){
    if(!state.tournamentId){
      $("submitMessage").textContent = "This registration link is missing a tournament id.";
      showToast("Missing tournament id");
      return;
    }

    const hasAnyValue = [
      getVal("teamName"),
      getVal("captainName"),
      getVal("player2"),
      getVal("player3"),
      getVal("player4"),
      getVal("player5"),
      getVal("player6"),
      getVal("captainEmail"),
      getVal("captainPhone"),
      getVal("notes")
    ].some(Boolean);

    if(!hasAnyValue){
      $("submitMessage").textContent = "Please enter at least one name, team, or contact detail before submitting.";
      showToast("Add some info first");
      return;
    }

    const btn = $("submitRegistrationBtn");
    btn.disabled = true;
    btn.textContent = "Submitting...";

    try{
      const assignedHole = await getNextAvailableHole(state.tournamentId);
      const payload = buildRegistrationPayload(assignedHole);

      await addDoc(
        collection(db, "tournaments", state.tournamentId, "registrations"),
        payload
      );

      const box = document.querySelector(".dash-box");
      box.innerHTML = `
        <h2 class="dash-title">THANK YOU FOR REGISTERING</h2>
        <div class="notice" style="margin-top:12px;">
          Your registration has been received successfully.
        </div>
        <div class="fine-print" style="margin-top:14px; font-size:clamp(18px,2.6vw,24px); font-weight:900;">
          ${assignedHole ? `Your starting hole is <b>${assignedHole}</b>.` : `Your team has been added to the roster.`}
        </div>
        <div class="fine-print" style="margin-top:10px;">
          Please arrive at your starting hole before the shotgun start. The organizer can still adjust assignments if needed.
        </div>
      `;

      showToast("Registration submitted");
    }catch(err){
      console.error(err);
      $("submitMessage").textContent = "There was a problem submitting your registration. Please try again.";
      showToast("Submission failed");
      btn.disabled = false;
      btn.textContent = "Submit Registration";
    }
  }

  $("submitRegistrationBtn").addEventListener("click", handleSubmit);

  $("sponsorHeroLink").addEventListener("click", (e) => {
    const href = $("sponsorHeroLink").getAttribute("href");
    if(!href) e.preventDefault();
  });

  (async function init(){
    await loadTournament();
  })();
</script>);
  
</body>
</html>
