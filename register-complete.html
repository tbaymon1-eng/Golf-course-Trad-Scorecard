<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Tournament Registration</title>

  <meta name="theme-color" content="#d9d1c2" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800;900&family=Barlow:wght@500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#d9d1c2;
      --panel:#ece7dc;
      --panel-2:#e8e2d6;
      --ink:#2f2a26;
      --muted:#6c645c;
      --line:#9a6217;
      --line-soft:#d2cbc0;
      --white:#ffffff;
      --green:#2f7a31;
      --blue:#12356f;
      --shadow:0 8px 24px rgba(0,0,0,.06);
      --radius:26px;
      --radius-sm:18px;
    }

    *{ box-sizing:border-box; }
    html,body{ margin:0; padding:0; }
    body{
      background:var(--bg);
      color:var(--ink);
      font-family:"Barlow", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }

    .page{
      width:min(920px, calc(100vw - 22px));
      margin:18px auto 30px;
      background:rgba(255,255,255,.18);
      border:6px solid rgba(154,98,23,.45);
      border-radius:32px;
      padding:18px;
      box-shadow:var(--shadow);
    }

    .main-card{
      background:rgba(255,255,255,.18);
      border:3px solid rgba(154,98,23,.75);
      border-radius:28px;
      overflow:hidden;
    }

    .hero{
      padding:22px 20px 20px;
      border-bottom:2px solid rgba(0,0,0,.08);
      background:linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.06));
      text-align:center;
    }

    .course-brand{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:10px;
      margin-bottom:16px;
    }

    .course-logo-wrap{
      width:min(220px, 60vw);
      min-height:86px;
      border-radius:22px;
      border:3px solid rgba(154,98,23,.45);
      background:rgba(255,255,255,.32);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:14px;
      overflow:hidden;
    }

    .course-logo-wrap img{
      max-width:100%;
      max-height:76px;
      object-fit:contain;
      display:block;
    }

    .course-brand-name{
      font-family:"Cinzel", serif;
      font-size:clamp(18px, 3vw, 30px);
      font-weight:800;
      color:#2e2a28;
      line-height:1.02;
    }

    .event-title{
      margin:0;
      font-family:"Cinzel", serif;
      letter-spacing:.02em;
      color:#2e2a28;
      font-size:clamp(30px, 6vw, 58px);
      line-height:.98;
      font-weight:900;
    }

    .event-meta{
      margin:14px auto 0;
      max-width:760px;
      font-size:clamp(17px, 2.8vw, 28px);
      line-height:1.08;
      color:#4b4641;
      font-weight:700;
    }

    .hero-divider{
      width:100%;
      height:2px;
      margin:18px 0 16px;
      background:linear-gradient(90deg, transparent, rgba(154,98,23,.55), transparent);
    }

    .sponsor-hero{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:10px;
    }

    .sponsor-kicker{
      font-family:"Cinzel", serif;
      font-size:clamp(14px, 2.2vw, 20px);
      font-weight:800;
      letter-spacing:.05em;
      color:#6d5730;
    }

    .sponsor-logo-wrap{
      width:min(240px, 64vw);
      min-height:84px;
      border-radius:22px;
      border:3px solid rgba(154,98,23,.45);
      background:rgba(255,255,255,.34);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:14px;
      overflow:hidden;
    }

    .sponsor-logo-wrap img{
      max-width:100%;
      max-height:74px;
      object-fit:contain;
      display:block;
    }

    .sponsor-name{
      font-size:clamp(20px, 3.4vw, 34px);
      font-weight:900;
      color:#2d2824;
      line-height:1.04;
    }

    .sponsor-link{
      color:#1b5fc8;
      font-size:clamp(15px, 2.3vw, 18px);
      font-weight:800;
      text-decoration:none;
      word-break:break-word;
    }

    .content{
      padding:20px;
    }

    .notice{
      margin:0 0 18px;
      padding:16px 18px;
      border-radius:20px;
      border:3px solid rgba(154,98,23,.3);
      background:rgba(255,255,255,.26);
      font-size:clamp(17px, 2.4vw, 22px);
      font-weight:800;
      color:#4d463f;
      text-align:center;
    }

    .dash-box{
      margin:18px 0 0;
      padding:18px;
      border:4px dashed var(--line-soft);
      border-radius:28px;
      background:rgba(255,255,255,.22);
    }

    .dash-title{
      margin:0 0 14px;
      font-family:"Cinzel", serif;
      font-size:clamp(24px, 3.6vw, 42px);
      font-weight:900;
      letter-spacing:.02em;
      color:#2e2a28;
    }

    .field{
      margin:0 0 18px;
    }

    .label{
      display:block;
      margin:0 0 10px;
      font-family:"Cinzel", serif;
      font-weight:800;
      font-size:clamp(18px, 2.6vw, 28px);
      color:#1f1b18;
      letter-spacing:.01em;
    }

    .hint{
      margin:10px 0 0;
      color:#5f5851;
      font-size:clamp(14px, 2vw, 18px);
      line-height:1.15;
      font-weight:700;
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"],
    textarea{
      width:100%;
      min-height:72px;
      padding:18px 24px;
      border-radius:24px;
      border:4px solid var(--line);
      background:#f4f4f4;
      color:#1f1b18;
      font-size:clamp(20px, 3.1vw, 34px);
      font-weight:800;
      font-family:"Barlow", sans-serif;
      outline:none;
      box-shadow:none;
      appearance:none;
      -webkit-appearance:none;
    }

    textarea{
      min-height:110px;
      resize:vertical;
    }

    input::placeholder,
    textarea::placeholder{
      color:transparent;
      opacity:0;
    }

    .btn{
      width:100%;
      min-height:88px;
      border:none;
      border-radius:24px;
      font-family:"Barlow", sans-serif;
      font-size:clamp(24px, 4vw, 40px);
      font-weight:900;
      letter-spacing:.01em;
      cursor:pointer;
      padding:16px 18px;
      text-align:center;
      box-shadow:none;
      -webkit-tap-highlight-color:transparent;
    }

    .btn-green{ background:var(--green); color:#fff; }

    .fine-print{
      margin-top:16px;
      text-align:center;
      color:#635b53;
      font-size:clamp(14px, 2vw, 17px);
      line-height:1.15;
      font-weight:700;
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:22px;
      transform:translateX(-50%);
      background:#1f1f1f;
      color:#fff;
      padding:12px 18px;
      border-radius:999px;
      font-weight:800;
      font-size:16px;
      opacity:0;
      pointer-events:none;
      transition:opacity .2s ease, transform .2s ease;
      z-index:9999;
    }

    .toast.show{
      opacity:1;
      transform:translateX(-50%) translateY(-4px);
    }

    .hidden{ display:none !important; }
  </style>
</head>
<body>
  <div class="page">
    <div class="main-card">
      <section class="hero">
        <div class="course-brand" id="courseBrandWrap">
          <div class="course-logo-wrap hidden" id="courseLogoWrap">
            <img id="courseLogoImg" alt="Course logo">
          </div>
          <div class="course-brand-name" id="courseBrandName">Golf Tournament</div>
        </div>

        <h1 class="event-title" id="eventTitle">TOURNAMENT REGISTRATION</h1>
        <div class="event-meta" id="eventMeta">Team and player registration</div>

        <div class="hero-divider"></div>

        <div class="sponsor-hero" id="sponsorHeroWrap">
          <div class="sponsor-kicker">SPONSORED BY</div>
          <div class="sponsor-logo-wrap hidden" id="sponsorLogoWrap">
            <img id="sponsorLogoImg" alt="Sponsor logo">
          </div>
          <div class="sponsor-name" id="sponsorHeroName"></div>
          <a id="sponsorHeroLink" class="sponsor-link hidden" target="_blank" rel="noopener">Visit Sponsor</a>
        </div>
      </section>

      <section class="content">
        <div class="notice" id="topNotice">
          Enter as much or as little information as you want, then submit.
        </div>

        <div class="dash-box">
          <h2 class="dash-title">TEAM REGISTRATION</h2>

          <div class="field">
            <label class="label" for="teamName">Team / Company Name</label>
            <input id="teamName" type="text" />
          </div>

          <div class="field">
            <label class="label" for="captainName">Captain Name</label>
            <input id="captainName" type="text" />
          </div>

          <div class="field">
            <label class="label" for="player2">Player 2</label>
            <input id="player2" type="text" />
          </div>

          <div class="field">
            <label class="label" for="player3">Player 3</label>
            <input id="player3" type="text" />
          </div>

          <div class="field">
            <label class="label" for="player4">Player 4</label>
            <input id="player4" type="text" />
          </div>

          <div class="field">
            <label class="label" for="player5">Player 5</label>
            <input id="player5" type="text" />
          </div>

          <div class="field">
            <label class="label" for="player6">Player 6</label>
            <input id="player6" type="text" />
          </div>

          <div class="field">
            <label class="label" for="captainEmail">Captain Email</label>
            <input id="captainEmail" type="email" />
          </div>

          <div class="field">
            <label class="label" for="captainPhone">Captain Phone</label>
            <input id="captainPhone" type="tel" />
          </div>

          <div class="field">
            <label class="label" for="notes">Notes</label>
            <textarea id="notes"></textarea>
          </div>

          <button class="btn btn-green" id="submitRegistrationBtn" type="button">Submit Registration</button>

          <div class="fine-print" id="submitMessage">
            Your registration will be saved for this tournament.
          </div>
        </div>
              </section>
    </div>
  </div>

  <div class="toast" id="toast">Saved</div>

  <script>
    const $ = (id) => document.getElementById(id);

    const params = new URLSearchParams(location.search);
    const tournamentId = params.get("id") || params.get("t") || "";

    const state = {
      tournamentId,
      tournament: null
    };

    function showToast(msg){
      const el = $("toast");
      el.textContent = msg;
      el.classList.add("show");
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => el.classList.remove("show"), 1700);
    }

    function storageKey(id){
      return `tournament_admin_${id}`;
    }

    function registrationKey(id){
      return `tournament_registrations_${id}`;
    }

    function safeText(value, fallback=""){
      return String(value || fallback || "").trim();
    }

    function escapeHtml(str){
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function normalizeUrl(url){
      const raw = String(url || "").trim();
      if(!raw) return "";
      if(/^https?:\/\//i.test(raw)) return raw;
      if(raw.startsWith("//")) return location.protocol + raw;
      return raw;
    }

    function getTournamentFromLocal(id){
      if(!id) return null;
      const raw = localStorage.getItem(storageKey(id));
      if(!raw) return null;
      try{
        return JSON.parse(raw);
      }catch(err){
        return null;
      }
    }

    function getTopSponsor(tournament){
      const sponsors = Array.isArray(tournament?.sponsors) ? tournament.sponsors : [];
      const active = sponsors
        .filter(s => s && s.active !== false)
        .sort((a,b)=>(Number(a.order ?? 999) - Number(b.order ?? 999)));

      if(active.length) return active[0];

      const legacyName = safeText(tournament?.sponsorName);
      const legacyLogo = safeText(tournament?.sponsorLogo);
      const legacyUrl  = safeText(tournament?.sponsorUrl);

      if(legacyName || legacyLogo || legacyUrl){
        return {
          name: legacyName,
          logoUrl: legacyLogo,
          website: legacyUrl
        };
      }

      return null;
    }

    function getCourseBranding(courseName){
      const name = safeText(courseName).toLowerCase();

      const map = {
        tradition: {
          brandName: "Tradition Course",
          logoUrl: ""
        },
        cypress: {
          brandName: "Cypress Course",
          logoUrl: ""
        },
        lake: {
          brandName: "Lake Course",
          logoUrl: ""
        },
        other: {
          brandName: safeText(courseName, "Golf Course"),
          logoUrl: ""
        }
      };

      return map[name] || {
        brandName: safeText(courseName, "Golf Course"),
        logoUrl: ""
      };
    }

    function setVisible(el, show){
      if(!el) return;
      el.classList.toggle("hidden", !show);
    }

    function renderCourseBrand(tournament){
      const courseName = safeText(tournament?.defaultCourse, "Golf Tournament");
      const customLogo = safeText(
        tournament?.courseLogoUrl ||
        tournament?.courseBrandLogoUrl ||
        tournament?.golfCourseLogoUrl
      );

      const branding = getCourseBranding(courseName);
      const logoUrl = normalizeUrl(customLogo || branding.logoUrl || "");

      $("courseBrandName").textContent = branding.brandName || courseName || "Golf Tournament";

      if(logoUrl){
        $("courseLogoImg").src = logoUrl;
        $("courseLogoImg").alt = `${courseName || "Course"} logo`;
        setVisible($("courseLogoWrap"), true);
      }else{
        $("courseLogoImg").removeAttribute("src");
        setVisible($("courseLogoWrap"), false);
      }
    }

    function renderSponsorHero(tournament){
      const sponsor = getTopSponsor(tournament);

      if(!sponsor){
        $("sponsorHeroName").textContent = "";
        $("sponsorHeroLink").removeAttribute("href");
        $("sponsorHeroLink").textContent = "";
        $("sponsorLogoImg").removeAttribute("src");
        setVisible($("sponsorLogoWrap"), false);
        setVisible($("sponsorHeroLink"), false);
        setVisible($("sponsorHeroWrap"), false);
        return;
      }

      const sponsorName = safeText(sponsor.name, "");
      const sponsorLogo = normalizeUrl(safeText(sponsor.logoUrl, ""));
      const sponsorUrl  = normalizeUrl(safeText(sponsor.website, ""));

      setVisible($("sponsorHeroWrap"), true);
      $("sponsorHeroName").textContent = sponsorName || "";

      if(sponsorLogo){
        $("sponsorLogoImg").src = sponsorLogo;
        $("sponsorLogoImg").alt = sponsorName ? `${sponsorName} logo` : "Sponsor logo";
        setVisible($("sponsorLogoWrap"), true);
      }else{
        $("sponsorLogoImg").removeAttribute("src");
        setVisible($("sponsorLogoWrap"), false);
      }

      if(sponsorUrl){
        $("sponsorHeroLink").href = sponsorUrl;
        $("sponsorHeroLink").textContent = sponsorUrl.replace(/^https?:\/\//i, "");
        setVisible($("sponsorHeroLink"), true);
      }else{
        $("sponsorHeroLink").removeAttribute("href");
        $("sponsorHeroLink").textContent = "";
        setVisible($("sponsorHeroLink"), false);
      }
    }

    function renderEventHeader(tournament){
      const title = safeText(tournament?.tournamentName, "TOURNAMENT REGISTRATION");
      const date  = safeText(tournament?.eventDate, "");
      const course = safeText(tournament?.defaultCourse, "");
      const format = safeText(tournament?.formatOfPlay, "");

      $("eventTitle").textContent = title;

      const parts = [date, course, format].filter(Boolean);
      $("eventMeta").textContent = parts.length ? parts.join(" • ") : "Team and player registration";

      renderCourseBrand(tournament);
      renderSponsorHero(tournament);
    }

    function renderMissingTournamentState(){
      $("eventTitle").textContent = "TOURNAMENT REGISTRATION";
      $("eventMeta").textContent = "Team and player registration";
      $("courseBrandName").textContent = "Golf Tournament";
      setVisible($("courseLogoWrap"), false);
      setVisible($("sponsorHeroWrap"), false);
      $("topNotice").textContent = "Enter as much or as little information as you want, then submit.";
    }

    function loadTournament(){
      if(!state.tournamentId){
        state.tournament = null;
        renderMissingTournamentState();
        return;
      }

      const tournament = getTournamentFromLocal(state.tournamentId);

      if(!tournament){
        state.tournament = null;
        renderMissingTournamentState();
        $("topNotice").textContent = "This registration page is ready. Tournament details will appear when available.";
        return;
      }

      state.tournament = tournament;
      renderEventHeader(tournament);
      $("topNotice").textContent = "Enter as much or as little information as you want, then submit.";
    }

    function getVal(id){
      const el = $(id);
      return el ? el.value.trim() : "";
    }

    function buildRegistrationPayload(){
      return {
        tournamentId: state.tournamentId || "",
        submittedAt: new Date().toISOString(),
        tournamentName: safeText(state.tournament?.tournamentName, ""),
        defaultCourse: safeText(state.tournament?.defaultCourse, ""),
        formatOfPlay: safeText(state.tournament?.formatOfPlay, ""),
        teamName: getVal("teamName"),
        captainName: getVal("captainName"),
        player2: getVal("player2"),
        player3: getVal("player3"),
        player4: getVal("player4"),
        player5: getVal("player5"),
        player6: getVal("player6"),
        captainEmail: getVal("captainEmail"),
        captainPhone: getVal("captainPhone"),
        notes: getVal("notes")
      };
    }
        function saveRegistration(payload){
      const key = registrationKey(state.tournamentId || "general");
      let list = [];

      try{
        const raw = localStorage.getItem(key);
        list = raw ? JSON.parse(raw) : [];
        if(!Array.isArray(list)) list = [];
      }catch(err){
        list = [];
      }

      payload.registrationId = `reg_${Date.now().toString(36)}${Math.random().toString(36).slice(2,7)}`;
      list.push(payload);
      localStorage.setItem(key, JSON.stringify(list));
      return payload;
    }

    function clearForm(){
      [
        "teamName",
        "captainName",
        "player2",
        "player3",
        "player4",
        "player5",
        "player6",
        "captainEmail",
        "captainPhone",
        "notes"
      ].forEach(id => {
        const el = $(id);
        if(el) el.value = "";
      });
    }

    function handleSubmit(){
      const payload = buildRegistrationPayload();

      const hasAnyValue = [
        payload.teamName,
        payload.captainName,
        payload.player2,
        payload.player3,
        payload.player4,
        payload.player5,
        payload.player6,
        payload.captainEmail,
        payload.captainPhone,
        payload.notes
      ].some(Boolean);

      if(!hasAnyValue){
        showToast("Add anything you want, then submit");
        $("submitMessage").textContent = "You can submit with any combination of team, players, or contact information.";
        return;
      }

      saveRegistration(payload);
      clearForm();
      $("submitMessage").textContent = "Registration submitted successfully.";
      showToast("Registration submitted");
    }

    $("submitRegistrationBtn").addEventListener("click", handleSubmit);

    $("sponsorHeroLink").addEventListener("click", (e) => {
      const href = $("sponsorHeroLink").getAttribute("href");
      if(!href) e.preventDefault();
    });

    (function init(){
      loadTournament();
    })();
  </script>
</body>
</html>
